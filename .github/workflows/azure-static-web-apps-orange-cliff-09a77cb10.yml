name: PhishRx — Staging Deploy (orange-cliff)

on:
  push:
    branches:
      - staging
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - staging

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        run: npm run build
        env:
          # Supabase anon key is public (ships in browser bundle) — safe to inline.
          # Staging project: medcurity-phishrx-staging (zkbrrlbwwckgqepeozjd)
          VITE_SUPABASE_URL: https://zkbrrlbwwckgqepeozjd.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprYnJybGJ3d2NrZ3FlcGVvempkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTU4OTcsImV4cCI6MjA5MjUzMTg5N30.fmi0H42Se6kAV0uX2LNwOmcUDWLBh3r1-_lWTgb60yY
          VITE_APP_NAME: PhishRx
          VITE_APP_URL: https://staging.phishrx.medcurity.com

      - name: Deploy to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_CLIFF_09A77CB10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_CLIFF_09A77CB10 }}
          action: "close"
